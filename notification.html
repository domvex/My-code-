<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notifications | Domvex</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, sans-serif; }
    body { background:#f8fafc; padding-bottom:40px; }
    .header-bar { background:#fff; padding:16px 18px; display:flex; align-items:center; gap:16px; border-bottom:1px solid #f1f5f9; position:sticky; top:0; }
    .back-btn { text-decoration:none; color:#0f172a; font-weight:700; font-size:20px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:#f8fafc; }
    .header-bar h2 { font-size:18px; font-weight:800; color:#0f172a; }

    .notif-card {
        margin: 14px 16px;
        background: #fff;
        border-radius: 14px;
        padding: 16px;
        border: 1px solid #f1f5f9;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .notif-card .msg { font-size: 14px; color: #0f172a; font-weight: 600; line-height: 1.5; }
    .notif-card .time { font-size: 12px; color: #94a3b8; margin-top: 8px; }
    .empty-state { text-align:center; padding:80px 20px; color:#94a3b8; font-size:14px; }

    /* ===== LIVE TOAST POP-UP (Rapido / Meesho style) ===== */
    .toast-stack {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        width: 92%;
        max-width: 420px;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
    }
    .toast-item {
        background: #0f172a;
        color: #ffffff;
        border-radius: 14px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        animation: toastSlideDown 0.35s cubic-bezier(0.22,1,0.36,1) both, toastFadeOut 0.4s ease 3.6s forwards;
        pointer-events: auto;
    }
    .toast-icon {
        width: 34px; height: 34px; border-radius: 50%;
        background: linear-gradient(135deg,#38bdf8,#6d28d9);
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; flex-shrink: 0;
    }
    .toast-text { font-size: 13.5px; font-weight: 600; line-height: 1.4; }
    @keyframes toastSlideDown {
        from { opacity: 0; transform: translateY(-30px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastFadeOut {
        from { opacity: 1; }
        to { opacity: 0; transform: translateY(-10px); }
    }
</style>
</head>
<body>

<div class="header-bar">
    <a href="index.html" class="back-btn">←</a>
    <h2>Notifications</h2>
</div>

<!-- Live pop-up toasts render here, on top of everything -->
<div class="toast-stack" id="toastStack"></div>

<div id="notifList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>
<script src="script.js"></script>
<script>
    // NOTE: config.js/script.js pehle se firebase.initializeApp() aur `const database`
    // set kar dete hain — yahan dobara declare nahi karna (purana duplicate bug tha).

    // ---- Existing list rendering (newest on top) ----
    database.ref('notifications').orderByChild('timestamp').on('value', snap => {
        const list = document.getElementById('notifList');
        list.innerHTML = '';
        let items = [];
        snap.forEach(child => items.push(child.val()));
        items.reverse();

        if (items.length === 0) {
            list.innerHTML = '<div class="empty-state">No notifications yet</div>';
            return;
        }

        items.forEach(n => {
            const d = new Date(n.timestamp);
            list.innerHTML += `
                <div class="notif-card">
                    <div class="msg">🔔 ${n.message}</div>
                    <div class="time">${d.toLocaleDateString()} • ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            `;
        });
    });

    // ===================================================================
    // LIVE TOAST POP-UP — shows a Rapido/Meesho-style banner the moment a
    // new notification is pushed, without waiting for page refresh.
    // We first record the latest existing timestamp as a baseline, then
    // only fire a toast for notifications newer than that baseline —
    // otherwise every old notification would pop up a toast on page load.
    // ===================================================================
    let notificationBaselineTimestamp = 0;

    database.ref('notifications').orderByChild('timestamp').once('value').then(snap => {
        snap.forEach(child => {
            const v = child.val();
            if (v.timestamp && v.timestamp > notificationBaselineTimestamp) {
                notificationBaselineTimestamp = v.timestamp;
            }
        });

        // Now start listening for genuinely new notifications
        database.ref('notifications').orderByChild('timestamp').on('child_added', childSnap => {
            const n = childSnap.val();
            if (n.timestamp && n.timestamp > notificationBaselineTimestamp) {
                showToast(n.message);
            }
        });
    });

    function showToast(message) {
        const stack = document.getElementById('toastStack');
        const toast = document.createElement('div');
        toast.className = 'toast-item';
        toast.innerHTML = `
            <div class="toast-icon">🔔</div>
            <div class="toast-text">${message}</div>
        `;
        stack.appendChild(toast);

        // Small vibration on supported mobile devices, harmless if unsupported
        if (navigator.vibrate) { navigator.vibrate(80); }

        // Remove from DOM after the fade-out animation finishes (~4s total)
        setTimeout(() => { toast.remove(); }, 4000);
    }
</script>
</body>
</html>
