<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Domvex | Service Selection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #ffffff; color: #0f172a; padding-bottom: 110px; }

        /* Header */
        .header-bar {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(12px);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #f1f5f9;
        }
        .back-btn {
            text-decoration: none;
            color: #0f172a;
            font-weight: 700;
            font-size: 20px;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            background: #f8fafc;
            flex-shrink: 0;
        }
        .back-btn:active { background: #f1f5f9; }
        #serviceTitle {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.3px;
        }

        /* BIG HERO IMAGE BANNER (jaisa AC Repair & Service screenshot me hai) */
        .hero-image-wrap {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #f1f5f9;
        }
        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .category-header {
            padding: 20px 18px 18px 18px;
            border-bottom: 8px solid #f8fafc;
        }
        .category-header h1 {
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .rating-line {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #334155;
            font-weight: 600;
        }
        .rating-line .star { color: #0f172a; font-size: 14px; }
        .rating-line .bookings-count { color: #64748b; font-weight: 500; }

        /* Section label */
        .section-label {
            font-size: 15px;
            font-weight: 800;
            color: #0f172a;
            padding: 20px 18px 12px 18px;
        }

        /* Premium List-Style Service Row (Urban Company jaisa) */
        .service-card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 18px;
            border-bottom: 1px solid #f1f5f9;
            background: #ffffff;
            transition: background 0.15s ease;
        }
        .service-card:active { background: #fafafa; }

        .service-info { flex: 1; padding-right: 18px; min-width: 0; }
        .service-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
            line-height: 1.35;
        }
        .price-tag {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
        }
        .view-details-link {
            display: inline-block;
            margin-top: 10px;
            font-size: 13px;
            font-weight: 700;
            color: #6d28d9;
            cursor: pointer;
        }

        .img-container {
            position: relative;
            width: 96px;
            flex-shrink: 0;
        }
        .service-img {
            width: 96px;
            height: 96px;
            border-radius: 14px;
            object-fit: cover;
            background: #f8fafc;
            display: block;
        }

        .add-btn {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 82%;
            background: #ffffff;
            color: #6d28d9;
            border: 1.5px solid #6d28d9;
            padding: 7px 0;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12.5px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(109, 40, 217, 0.15);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .add-btn.added {
            background: #6d28d9;
            color: white;
            border: none;
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 4px 12px rgba(109, 40, 217, 0.35);
        }

        /* Floating Cart Button */
        #cartBtn {
            position: fixed;
            bottom: 18px;
            left: 16px;
            right: 16px;
            background: linear-gradient(90deg, #6d28d9, #4f46e5);
            color: white;
            padding: 17px;
            border-radius: 14px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            display: none;
            cursor: pointer;
            box-shadow: 0 12px 24px -6px rgba(109, 40, 217, 0.55);
            animation: slideUp 0.35s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .coming-soon {
            text-align: center;
            padding: 100px 24px;
            color: #64748b;
        }
        .coming-soon h2 { font-size: 20px; color: #0f172a; margin-bottom: 10px; }
        .coming-soon p { font-size: 14px; }

        /* Mobile fine-tune */
        @media screen and (max-width: 420px) {
            .hero-image-wrap { height: 170px; }
            .category-header h1 { font-size: 22px; }
            .service-info h3 { font-size: 15px; }
            .img-container { width: 84px; }
            .service-img { width: 84px; height: 84px; border-radius: 12px; }
        }
    </style>
</head>
<body>

<div class="header-bar">
    <a href="index.html" class="back-btn">←</a>
    <h2 id="serviceTitle">Services</h2>
</div>

<div class="hero-image-wrap">
    <img id="heroImg" class="hero-image" src="" onerror="this.src='https://via.placeholder.com/600x300'">
</div>

<div class="category-header">
    <h1 id="bannerName">Loading...</h1>
    <div class="rating-line">
        <span class="star">★</span>
        <span id="ratingText"></span>
    </div>
</div>

<div class="section-label" id="sectionLabel">All Services</div>
<div id="serviceContainer"></div>

<div id="cartBtn" onclick="goToBooking()">View Booking</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const category = params.get('category');
    document.getElementById('serviceTitle').innerText = category;
    document.getElementById('bannerName').innerText = category;

    const services = {
        "Electrician": [
            { name: "Switch/Socket Repair", price: "₹119", img: "switch.jpg" }, { name: "Fan Installation", price: "₹179", img: "fan_install.jpg" }, { name: "Ceiling Fan Repair", price: "₹149", img: "fan_repair.jpg" }, { name: "Tube Light Fitting", price: "₹119", img: "tubelight.jpg" }, { name: "Door Bell Installation", price: "₹149", img: "doorbell.jpg" }, { name: "Exhaust Fan Installation", price: "₹179", img: "exhaust.jpg" }, { name: "Fault Finding Visit", price: "₹149", img: "fault.jpg" }, { name: "MCB Replacement", price: "₹249", img: "mcb.jpg" }, { name: "Minor Wiring Work", price: "₹349", img: "wiring.jpg" }, { name: "Geyser Installation", price: "₹399", img: "geyser.jpg" }, { name: "Inverter Installation", price: "₹599", img: "inverter.jpg" }
        ],
        "Plumber": [
            { name: "Tap Repair", price: "₹119", img: "tap.jpg" }, { name: "Leakage Repair", price: "₹179", img: "leak.jpg" }, { name: "Flush Repair", price: "₹249", img: "flush.jpg" }, { name: "Drain Cleaning", price: "₹249", img: "drain.jpg" }, { name: "Wash Basin Fitting", price: "₹299", img: "basin.jpg" }, { name: "Jet Spray Installation", price: "₹149", img: "jetspray.jpg" }, { name: "Water Motor Checkup", price: "₹249", img: "motor_check.jpg" }, { name: "Water Motor Installation", price: "₹599", img: "motor_install.jpg" }, { name: "Water Tank Cleaning", price: "₹699", img: "tank_clean.jpg" }
        ],
        "AC Technician": [
            { name: "AC Inspection", price: "₹149", img: "ac_inspect.jpg" }, { name: "AC General Service", price: "₹499", img: "ac_general.jpg" }, { name: "Foam Jet Service", price: "₹549", img: "ac_foam.jpg" }, { name: "Deep Cleaning", price: "₹699", img: "ac_deep.jpg" }, { name: "AC Installation", price: "₹899", img: "ac_install.jpg" }, { name: "AC Uninstallation", price: "₹499", img: "ac_uninstall.jpg" }, { name: "Water Leakage Fix", price: "₹349", img: "ac_leak.jpg" }, { name: "PCB Checkup", price: "₹299", img: "ac_pcb.jpg" }, { name: "Gas Refill", price: "₹2499+", img: "ac_gas.jpg" }
        ],
        "Cleaning": [
            { name: "Bathroom Cleaning", price: "₹349", img: "bath_clean.jpg" }, { name: "Kitchen Cleaning", price: "₹699", img: "kitchen_clean.jpg" }, { name: "Sofa Cleaning", price: "₹599", img: "sofa_clean.jpg" }, { name: "Mattress Cleaning", price: "₹299", img: "mattress_clean.jpg" }, { name: "Tank Cleaning (Ext)", price: "₹699", img: "tank_clean_ext.jpg" }, { name: "Chimney Cleaning", price: "₹499", img: "chimney.jpg" }, { name: "1 BHK Deep Cleaning", price: "₹2499", img: "1bhk.jpg" }, { name: "2 BHK Deep Cleaning", price: "₹3499", img: "2bhk.jpg" }, { name: "3 BHK Deep Cleaning", price: "₹4999", img: "3bhk.jpg" }
        ],
        "Painting": [
            { name: "Wall Touch-up", price: "₹399", img: "touchup.jpg" }, { name: "Single Accent Wall", price: "₹999", img: "accent.jpg" }, { name: "Room Painting", price: "₹2999", img: "room_paint.jpg" }, { name: "1 BHK Painting", price: "₹11999", img: "1bhk_paint.jpg" }, { name: "2 BHK Painting", price: "₹16999", img: "2bhk_paint.jpg" }, { name: "3 BHK Painting", price: "₹22999", img: "3bhk_paint.jpg" }, { name: "Putty Work", price: "₹12/sq ft", img: "putty.jpg" }, { name: "Texture Paint", price: "₹25/sq ft", img: "texture.jpg" }
        ],
        "Beauty/Spa": [
            { name: "Hair Cut", price: "₹249", img: "haircut.jpg" }, { name: "Beard Styling", price: "₹149", img: "beard.jpg" }, { name: "Hair Spa", price: "₹699", img: "hairspa.jpg" }, { name: "Hair Smoothening", price: "₹2499", img: "smoothening.jpg" }, { name: "Facial", price: "₹599", img: "facial.jpg" }, { name: "Cleanup", price: "₹399", img: "cleanup.jpg" }, { name: "Full Arms Waxing", price: "₹299", img: "arms_wax.jpg" }, { name: "Full Legs Waxing", price: "₹499", img: "legs_wax.jpg" }, { name: "Manicure", price: "₹399", img: "mani.jpg" }, { name: "Pedicure", price: "₹499", img: "pedi.jpg" }, { name: "Threading", price: "₹49", img: "thread.jpg" }, { name: "Party Makeup", price: "₹1999", img: "party.jpg" }, { name: "Bridal Makeup", price: "₹5999+", img: "bridal.jpg" }
        ],
        "Laptop Repair": "coming-soon",
        "Physiotherapist": "coming-soon"
    };

    /* Har category ka hero image (existing filenames se) + rating/bookings */
    const categoryMeta = {
        "Electrician":   { img: "geyser.jpg",       rating: "4.78", bookings: "2.1 k bookings" },
        "Plumber":       { img: "tap.jpg",          rating: "4.75", bookings: "2.4 k bookings" },
        "AC Technician": { img: "ac_deep.jpg",      rating: "4.77", bookings: "3.4 k bookings" },
        "Cleaning":      { img: "kitchen_clean.jpg",rating: "4.72", bookings: "1.4 k bookings" },
        "Painting":      { img: "room_paint.jpg",   rating: "4.69", bookings: "1.2 k bookings" },
        "Beauty/Spa":    { img: "hairspa.jpg",      rating: "4.81", bookings: "2.5 k bookings" }
    };

    const meta = categoryMeta[category];
    const heroWrap = document.querySelector('.hero-image-wrap');
    const catHeader = document.querySelector('.category-header');

    if (meta) {
        document.getElementById('heroImg').src = meta.img;
        document.getElementById('ratingText').innerHTML = `${meta.rating} <span class="bookings-count">(${meta.bookings})</span>`;
    } else {
        heroWrap.style.display = 'none';
        catHeader.style.display = 'none';
    }

    let cart = [];

    function toggleService(btn, name, price) {
        const index = cart.findIndex(item => item.name === name);
        if (index > -1) {
            cart.splice(index, 1);
            btn.innerText = "Add";
            btn.classList.remove('added');
        } else {
            cart.push({ name, price });
            btn.innerText = "Added";
            btn.classList.add('added');
        }

        const cartBtn = document.getElementById('cartBtn');
        if (cart.length > 0) {
            cartBtn.style.display = 'block';
            cartBtn.innerText = `View Booking (${cart.length} Items)`;
        } else {
            cartBtn.style.display = 'none';
        }
    }

    function goToBooking() {
        localStorage.setItem('cartItems', JSON.stringify(cart));
        window.location.href = 'booking_page.html';
    }

    const container = document.getElementById('serviceContainer');
    const sectionLabel = document.getElementById('sectionLabel');
    const data = services[category];

    if (data === "coming-soon") {
        sectionLabel.style.display = 'none';
        container.innerHTML = `<div class="coming-soon"><h2>🚀 Services Coming Soon!</h2><p>We are onboarding experts for ${category}.</p></div>`;
    } else if (data) {
        data.forEach(s => {
            container.innerHTML += `
                <div class="service-card">
                    <div class="service-info">
                        <h3>${s.name}</h3>
                        <span class="price-tag">${s.price}</span>
                        <span class="view-details-link">View details</span>
                    </div>
                    <div class="img-container">
                        <img src="${s.img}" class="service-img" onerror="this.src='https://via.placeholder.com/100'">
                        <button class="add-btn" onclick="toggleService(this, '${s.name}', '${s.price}')">Add</button>
                    </div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
