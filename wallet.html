<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Wallet | Domvex</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, sans-serif; }
    body { background:#f8fafc; padding-bottom:40px; }
    .header-bar { background:#fff; padding:16px 18px; display:flex; align-items:center; gap:16px; border-bottom:1px solid #f1f5f9; position:sticky; top:0; }
    .back-btn { text-decoration:none; color:#0f172a; font-weight:700; font-size:20px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:#f8fafc; }
    .header-bar h2 { font-size:18px; font-weight:800; color:#0f172a; }

    .balance-card {
        margin: 20px 16px;
        background: linear-gradient(135deg, #6d28d9, #4f46e5);
        border-radius: 18px;
        padding: 26px 22px;
        color: white;
        box-shadow: 0 10px 25px -8px rgba(109,40,217,0.5);
    }
    .balance-card .label { font-size: 13px; opacity: 0.85; margin-bottom: 8px; }
    .balance-card .amount { font-size: 34px; font-weight: 800; }

    .info-box {
        margin: 0 16px 16px 16px;
        background: #ecfdf5;
        border: 1px solid #a7f3d0;
        border-radius: 12px;
        padding: 14px;
        font-size: 13px;
        color: #065f46;
    }

    .history-label { padding: 20px 18px 10px 18px; font-size: 15px; font-weight: 800; color:#0f172a; }
    .txn-row { display:flex; justify-content:space-between; padding: 14px 18px; border-bottom:1px solid #f1f5f9; background:#fff; }
    .txn-row .txn-name { font-size:14px; font-weight:600; color:#0f172a; }
    .txn-row .txn-date { font-size:12px; color:#64748b; margin-top:3px; }
    .txn-amt { color:#dc2626; font-weight:700; }
    .empty-state { text-align:center; padding:60px 20px; color:#94a3b8; font-size:14px; }
</style>
</head>
<body>

<div class="header-bar">
    <a href="index.html" class="back-btn">←</a>
    <h2>My Wallet</h2>
</div>

<div class="balance-card">
    <div class="label">Available Balance</div>
    <div class="amount" id="balanceAmt">₹0</div>
</div>

<div class="info-box">💰 Earn ₹50 cashback on bookings above ₹800 (first 3 bookings only). Use your balance on future bookings!</div>

<div class="history-label">Recent Bookings</div>
<div id="txnList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCpoTdWajiA1rjX6AzIJ10hZ_EkW5YrmNE", authDomain: "domvex-45097.firebaseapp.com", databaseURL: "https://domvex-45097-default-rtdb.firebaseio.com/", projectId: "domvex-45097", storageBucket: "domvex-45097.firebasestorage.app", messagingSenderId: "317471334986", appId: "1:317471334986:web:c9f1a80e93ad1f13c93cb3" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    const phone = localStorage.getItem('customerPhone');
    if (!phone) {
        alert('Please login first!');
        window.location.href = 'index.html';
    } else {
        database.ref('customers/' + phone).on('value', snap => {
            const data = snap.val() || {};
            document.getElementById('balanceAmt').innerText = "₹" + (data.walletBalance || 0);
        });

        database.ref('bookings').orderByChild('customerPhone').equalTo(phone).on('value', snap => {
            const list = document.getElementById('txnList');
            list.innerHTML = '';
            let hasData = false;
            snap.forEach(child => {
                hasData = true;
                const b = child.val();
                list.innerHTML += `
                    <div class="txn-row">
                        <div>
                            <div class="txn-name">${b.service || 'Service'}</div>
                            <div class="txn-date">${b.date || ''}</div>
                        </div>
                        <div class="txn-amt">${b.price || ''}</div>
                    </div>
                `;
            });
            if (!hasData) { list.innerHTML = '<div class="empty-state">No bookings yet</div>'; }
        });
    }
</script>
</body>
</html>
