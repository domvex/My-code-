<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domvex Worker Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0b0f17; color: white; padding: 20px; }
        
        header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; text-align: center; }
        h1 { color: #00d2ff; font-weight: 800; }
        .header-actions { display: flex; gap: 10px; justify-content: center; }
        .earnings-link { background: #6366f1; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .logout-btn { background: #ef4444; color: white; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .grid-container { grid-template-columns: 1fr 1fr; } }
        
        .panel { background: #111827; border: 1px solid #1f2937; padding: 20px; border-radius: 16px; }
        .card { background: #1f2937; border: 1px solid #374151; padding: 18px; border-radius: 12px; margin-bottom: 15px; transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); }
        
        .status-pending { color: #fbbf24; font-weight: bold; }
        .status-accepted { color: #10b981; font-weight: bold; }
        .status-completed { color: #6366f1; font-weight: bold; }
        
        .action-btn { background: #00d2ff; color: #0b0f17; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; display: block; width: 100%; text-align: center; text-decoration: none; }
        .complete-btn { background: #10b981; color: white; }
        .call-btn { background: #f59e0b; color: white; }
        .cancel-btn { background: transparent; border: 1.5px solid #ef4444; color: #ef4444; }
        .rating-box { background: rgba(245, 158, 11, 0.1); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 2px solid #f59e0b; text-align: center; }

        .cust-box { background:#111827; border-radius:10px; padding:12px; margin-top:10px; font-size:13px; color:#cbd5e1; }
        .cust-box p { margin-bottom:4px; }
        .eta-line { background:linear-gradient(135deg,#1e3a8a,#312e81); border-radius:10px; padding:10px 12px; font-size:12.5px; font-weight:700; color:#e0e7ff; margin-top:10px; }
        .map-box { height:160px; border-radius:10px; margin-top:10px; overflow:hidden; border:1px solid #374151; }
    </style>
</head>
<body>

    <header>
        <h1>WORKER DASHBOARD</h1>
        <div class="header-actions">
            <a href="worker_earning.html" class="earnings-link">Earnings</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>
    
    <div class="grid-container">
        <div class="panel">
            <div class="rating-box">
                <h2 style="color: #f59e0b;">⭐ My Average Rating</h2>
                <h1 id="myRating">0.0</h1>
            </div>
            <h2 style="color: #00d2ff; margin-bottom: 15px;">🛒 My Bookings</h2>
            <div id="liveBookings">Loading your services...</div>
        </div>
        <div class="panel">
            <h2 style="color: #9b51e0; margin-bottom: 15px;">👷 Active Expert Network</h2>
            <div id="liveWorkers">Loading...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="config.js"></script>

<script src="script.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCpoTdWajiA1rjX6AzIJ10hZ_EkW5YrmNE",
            authDomain: "domvex-45097.firebaseapp.com",
            databaseURL: "https://domvex-45097-default-rtdb.firebaseio.com/",
            projectId: "domvex-45097",
            storageBucket: "domvex-45097.firebasestorage.app",
            messagingSenderId: "317471334986",
            appId: "1:317471334986:web:c9f1a80e93ad1f13c93cb3"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let mySkill = "";
        let myName = "";
        let myPhoto = "";
        const phone = localStorage.getItem('workerPhone');

        const trackers = {};
        const maps = {};
        const markers = {};

        window.onload = function() {
            if (!phone) {
                alert("Access Denied! Login required.");
                window.location.href = 'index.html';
                return;
            }
            database.ref('workers/' + phone).once('value', (snap) => {
                if(snap.exists()) {
                    const w = snap.val();
                    mySkill = w.skill;
                    myName = w.name;
                    myPhoto = w.workerPhoto || '';
                    loadBookings();
                    loadRating();
                }
            });
        };

        function loadRating() {
            database.ref('workers/' + phone + '/ratings').on('value', (snap) => {
                let total = 0, count = 0;
                snap.forEach(r => { total += parseInt(r.val().rating); count++; });
                document.getElementById('myRating').innerText = count > 0 ? (total/count).toFixed(1) : "0.0";
            });
        }

        function haversineKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function startSharingLocation(id) {
            if (trackers[id] || !navigator.geolocation) return;
            const push = () => {
                navigator.geolocation.getCurrentPosition(pos => {
                    database.ref('bookings/' + id + '/workerLocation').set({
                        lat: pos.coords.latitude, lng: pos.coords.longitude, updatedAt: Date.now()
                    });
                }, () => {}, { enableHighAccuracy: true });
            };
            push();
            trackers[id] = setInterval(push, 15000);
        }

        function stopSharingLocation(id) {
            if (trackers[id]) { clearInterval(trackers[id]); delete trackers[id]; }
        }

        function initMap(id) {
            if (maps[id]) return;
            const el = document.getElementById(`map-${id}`);
            if (!el) return;
            const map = L.map(el, { zoomControl:false, attributionControl:false }).setView([20.5937, 78.9629], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            maps[id] = map;
            markers[id] = {};
        }

        function updateMapMarkers(id, workerLoc, customerLoc) {
            if (!maps[id]) return;
            const map = maps[id];
            const pts = [];
            if (workerLoc) {
                if (!markers[id].worker) {
                    markers[id].worker = L.marker([workerLoc.lat, workerLoc.lng], {
                        icon: L.divIcon({ className:'', html:'<div style="background:#00d2ff;width:16px;height:16px;border-radius:50%;border:3px solid white;"></div>' })
                    }).addTo(map);
                } else { markers[id].worker.setLatLng([workerLoc.lat, workerLoc.lng]); }
                pts.push([workerLoc.lat, workerLoc.lng]);
            }
            if (customerLoc) {
                if (!markers[id].customer) {
                    markers[id].customer = L.marker([customerLoc.lat, customerLoc.lng], {
                        icon: L.divIcon({ className:'', html:'<div style="background:#22c55e;width:16px;height:16px;border-radius:50%;border:3px solid white;"></div>' })
                    }).addTo(map);
                } else { markers[id].customer.setLatLng([customerLoc.lat, customerLoc.lng]); }
                pts.push([customerLoc.lat, customerLoc.lng]);
            }
            if (pts.length === 2) {
                map.fitBounds(pts, { padding:[20,20] });
                const km = haversineKm(pts[0][0], pts[0][1], pts[1][0], pts[1][1]);
                const el = document.getElementById(`eta-${id}`);
                if (el) el.innerText = `Customer is ~${km.toFixed(1)} km away`;
            } else if (pts.length === 1) {
                map.setView(pts[0], 14);
            }
        }

        function loadBookings() {
            database.ref('bookings').on('value', (snap) => {
                const container = document.getElementById('liveBookings');
                container.innerHTML = '';
                let found = false;
                snap.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    const isMyAccepted = (data.status === 'Accepted' && data.acceptedBy === phone);
                    const isAvailable = (data.status === 'Pending' && data.service === mySkill);
                    if(isMyAccepted || isAvailable) {
                        found = true;
                        container.innerHTML += `
                            <div class="card">
                                <p><strong>ID:</strong> ${data.bookingId || id} <span class="status-${(data.status||'').toLowerCase()}">[${data.status}]</span></p>
                                <p><strong>Customer:</strong> ${data.customerName}</p>
                                <p><strong>Service:</strong> ${data.service}</p>
                                <p><strong>Address:</strong> ${data.address}</p>
                                ${isMyAccepted ? `
                                <div class="cust-box">
                                    <p>📞 ${data.customerPhone}</p>
                                    <p>📍 ${data.address}</p>
                                </div>
                                <div class="eta-line" id="eta-${id}">Fetching customer location...</div>
                                <div class="map-box" id="map-${id}"></div>
                                <a href="tel:${data.customerPhone}" class="action-btn call-btn">Call Customer</a>
                                ` : ''}
                                ${data.status === 'Pending' ? `<button class="action-btn" onclick="updateStatus('${id}', 'Accepted')">Accept Booking</button>` : ''}
                                ${isMyAccepted ? `<button class="action-btn complete-btn" onclick="updateStatus('${id}', 'Completed')">Complete Job</button>` : ''}
                                ${isMyAccepted ? `<button class="action-btn cancel-btn" onclick="cancelBooking('${id}')">Cancel Booking</button>` : ''}
                            </div>`;
                    }
                });
                if(!found) container.innerHTML = '<p>No bookings available.</p>';

                snap.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    if (data.status === 'Accepted' && data.acceptedBy === phone) {
                        initMap(id);
                        startSharingLocation(id);
                        database.ref('bookings/' + id + '/customerLocation').on('value', csnap => {
                            database.ref('bookings/' + id + '/workerLocation').once('value').then(wsnap => {
                                updateMapMarkers(id, wsnap.val(), csnap.val());
                            });
                        });
                    }
                });
            });
        }

        function updateStatus(id, newStatus) {
            if (newStatus === 'Accepted') {
                database.ref('bookings/' + id).update({
                    status: 'Accepted',
                    acceptedBy: phone,
                    workerName: myName,
                    workerPhoto: myPhoto,
                    workerPhone: phone
                }).then(() => {
                    startSharingLocation(id);
                    alert("Booking Accepted!");
                });
                return;
            }
            if (newStatus === 'Completed') {
                stopSharingLocation(id);
                database.ref('bookings/' + id).update({ status: 'Completed', completedAt: Date.now() }).then(() => {
                    alert("Job marked as completed!");
                });
                return;
            }
        }

        function cancelBooking(id) {
            if (!confirm("Cancel this booking? It will go back to the available pool for other workers.")) return;
            stopSharingLocation(id);
            database.ref('bookings/' + id).update({
                status: 'Pending',
                acceptedBy: null,
                workerName: null,
                workerPhoto: null,
                workerPhone: null,
                workerLocation: null
            }).then(() => alert("Booking cancelled and returned to the pool."));
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        database.ref('workers').on('value', (snap) => {
            const container = document.getElementById('liveWorkers');
            container.innerHTML = '';
            snap.forEach((child) => {
                const data = child.val();
                container.innerHTML += `<div class="card"><p><strong>${data.name}</strong> (${data.skill})</p></div>`;
            });
        });

        if (localStorage.getItem('workerPhone') && !localStorage.getItem('isRegistered')) {
            window.location.href = 'terms.html';
        }

        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
